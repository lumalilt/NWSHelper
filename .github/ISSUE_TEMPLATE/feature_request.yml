name: Feature request
description: Suggest an improvement for the public GUI, CLI, docs, or release experience.
title: "feature: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or opportunity
      description: What is missing or painful today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the behavior you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional. Include workarounds or other approaches you evaluated.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, mockups, workflow notes, or compatibility concerns.