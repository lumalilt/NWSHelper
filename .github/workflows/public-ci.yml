name: public-ci

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  public-tests:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Run public-safe tests
        run: dotnet test .\NWSHelper.Public.Tests\NWSHelper.Public.Tests.csproj --configuration Release --nologo